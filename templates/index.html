<!DOCTYPE html>
<html>
<head>
    <title>Jungle of Text</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Jungle of Text</h1>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <form action="/add" method="POST">
        <input type="text" name="text" placeholder="Send a message into the jungle..." required>
        <button type="submit">Add</button>
    </form>

    <h2>Current Texts in the Jungle</h2>
    <ul>
        {% for note in notes %}
            <li>{{ note.text }}</li>
        {% endfor %}
    </ul>
</body>
</html>
